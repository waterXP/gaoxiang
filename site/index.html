<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>信息系统项目管理师 · 学习系统</title>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<style>
/* ── Reset & Variables ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sidebar-w: 272px;
  --bg: #f4f4f0;
  --surface: #fff;
  --sidebar: #16213e;
  --sidebar-hover: #0f3460;
  --accent: #4f8ef7;
  --accent-dark: #2563eb;
  --text: #1a1a1a;
  --muted: #6b7280;
  --border: #e5e7eb;
  --green: #16a34a;
  --yellow: #fef3c7;
  --radius: 8px;
}

body {
  font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
  font-size: 15px;
  line-height: 1.75;
}

/* ── Sidebar ───────────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar);
  color: #cbd5e1;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

#sidebar-top {
  padding: 18px 16px 14px;
  border-bottom: 1px solid #1e3a5f;
}

#app-title {
  font-size: 12.5px;
  font-weight: 700;
  color: #fff;
  line-height: 1.4;
  margin-bottom: 12px;
}

/* Progress */
.prog-row { display: flex; justify-content: space-between; font-size: 11px; color: #94a3b8; margin-bottom: 5px; }
.prog-bar { height: 5px; background: #1e3a5f; border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
.prog-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; }

/* Check-in */
#checkin-btn {
  width: 100%;
  padding: 8px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 12.5px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: background .2s;
}
#checkin-btn.done { background: var(--green); }
#checkin-btn:hover { filter: brightness(1.1); }

/* Chapter list */
#ch-list { flex: 1; overflow-y: auto; padding: 6px 0; }
#ch-list::-webkit-scrollbar { width: 3px; }
#ch-list::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 2px; }

.ch-item {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  padding: 8px 14px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background .15s;
  font-size: 12px;
  line-height: 1.45;
}
.ch-item:hover { background: #1e3a5f; }
.ch-item.active { background: #1e3a5f; border-left-color: var(--accent); color: #fff; }
.ch-item.done .ch-dot { background: var(--green); }
.ch-dot { width: 7px; height: 7px; border-radius: 50%; background: #2d4a6e; flex-shrink: 0; margin-top: 5px; }
.ch-label { flex: 1; }

/* ── Main ──────────────────────────────────────────────────── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* Toolbar */
#toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#search-wrap { position: relative; flex: 1; }
#search-input {
  width: 100%;
  padding: 8px 38px 8px 14px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 14px;
  outline: none;
  background: var(--bg);
  font-family: inherit;
  transition: border-color .2s;
}
#search-input:focus { border-color: var(--accent); }
#search-icon { position: absolute; right: 13px; top: 50%; transform: translateY(-50%); color: #9ca3af; font-size: 14px; pointer-events: none; }

#streak { font-size: 13px; color: #f97316; font-weight: 700; white-space: nowrap; }

.tbtn {
  padding: 7px 14px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: var(--surface);
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  font-family: inherit;
  color: var(--text);
  transition: all .15s;
}
.tbtn:hover { background: var(--bg); }
.tbtn.on { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Content wrapper */
#content-wrap { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

/* ── Search Results ────────────────────────────────────────── */
#search-panel { display: none; flex: 1; overflow-y: auto; padding: 20px; }
#search-panel h3 { font-size: 13px; color: var(--muted); margin-bottom: 12px; }

.sr-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: box-shadow .15s;
}
.sr-item:hover { box-shadow: 0 2px 10px rgba(0,0,0,.08); }
.sr-tag { font-size: 11px; color: var(--accent); font-weight: 700; margin-bottom: 5px; }
.sr-snippet { font-size: 13px; line-height: 1.65; }
.sr-snippet mark { background: var(--yellow); color: var(--text); border-radius: 2px; padding: 0 1px; }

/* ── Chapter View ──────────────────────────────────────────── */
#chapter-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

#ch-header {
  padding: 14px 24px 10px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 12px;
}
#ch-header h2 { font-size: 16px; font-weight: 700; flex: 1; }
#ch-meta { font-size: 12px; color: var(--muted); white-space: nowrap; }

#done-btn {
  padding: 5px 14px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: var(--surface);
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
  transition: all .15s;
}
#done-btn.done { background: #dcfce7; border-color: var(--green); color: #166534; }

/* Article content */
#article {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px 60px;
  max-width: 860px;
  width: 100%;
  margin: 0 auto;
}

/* Tables */
#article table {
  width: 100%;
  border-collapse: collapse;
  margin: 14px 0 18px;
  font-size: 13.5px;
}
#article table th, #article table td {
  border: 1px solid var(--border);
  padding: 8px 12px;
  text-align: left;
  vertical-align: top;
  line-height: 1.6;
}
#article table th {
  background: #eef2ff;
  font-weight: 700;
  color: #1e3a5f;
}
#article table tr:nth-child(even) td { background: #f9fafb; }
#article table.t-kaofenxi td { text-align: center; }
#article table.t-kaofenxi td:first-child { text-align: left; min-width: 80px; }
#article table.t-def td:first-child { width: 120px; color: #1e40af; white-space: nowrap; }
/* Raw table-like block */
#article .t-raw {
  background: #f8faff;
  border: 1px solid #dbeafe;
  border-radius: 6px;
  padding: 10px 14px;
  margin: 10px 0;
  font-size: 13px;
  color: #374151;
  line-height: 2;
}

/* Typography */
#article h2 {
  font-size: 18px;
  font-weight: 700;
  margin: 28px 0 10px;
  padding-bottom: 6px;
  border-bottom: 2px solid var(--accent);
  color: #1e3a5f;
}
#article h2:first-child { margin-top: 0; }

#article h3 {
  font-size: 15px;
  font-weight: 700;
  margin: 20px 0 8px;
  color: #1e40af;
}

#article p {
  margin-bottom: 10px;
  line-height: 1.85;
  text-align: justify;
}

#article ul {
  margin: 8px 0 12px 20px;
  list-style: none;
}
#article ul li {
  padding: 3px 0;
  line-height: 1.75;
  position: relative;
}
#article ul li::before {
  content: '▸';
  color: var(--accent);
  position: absolute;
  left: -16px;
  font-size: 11px;
  top: 6px;
}

.label { display: inline-block; background: #f1f5f9; border-radius: 3px; padding: 1px 6px; font-size: 12px; color: var(--muted); margin: 1px; }

.page-marker {
  display: inline-block;
  font-size: 10px;
  color: #94a3b8;
  background: #f1f5f9;
  border-radius: 3px;
  padding: 1px 6px;
  margin: 8px 0 6px;
  vertical-align: middle;
}

/* Memo mode */
body.memo #article p,
body.memo #article li {
  filter: blur(5px);
  transition: filter .2s;
  cursor: pointer;
  border-radius: 3px;
}
body.memo #article p.show,
body.memo #article li.show {
  filter: none;
  cursor: default;
  background: var(--yellow);
  border-radius: 3px;
  padding: 2px 4px;
}

/* Chapter nav */
#ch-nav {
  display: none;
  padding: 8px 24px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
}
#ch-nav.visible { display: flex; }
#ch-nav button {
  padding: 6px 18px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: var(--surface);
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  transition: background .15s;
}
#ch-nav button:hover:not(:disabled) { background: var(--bg); }
#ch-nav button:disabled { opacity: .35; cursor: default; }
#ch-nav .nav-info { color: var(--muted); }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="sidebar-top">
    <div id="app-title">信息系统项目管理师<br>2026 考试学习系统</div>
    <div class="prog-row">
      <span>学习进度</span><span id="prog-text">0 / 0 章</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <button id="checkin-btn">📅 今日打卡</button>
  </div>
  <div id="ch-list"></div>
</div>

<!-- MAIN -->
<div id="main">
  <!-- Toolbar -->
  <div id="toolbar">
    <div id="search-wrap">
      <input id="search-input" type="text" placeholder="搜索知识点…" autocomplete="off">
      <span id="search-icon">🔍</span>
    </div>
    <span id="streak"></span>
    <button class="tbtn" id="memo-btn">🙈 背诵模式</button>
    <button class="tbtn" id="reveal-btn" style="display:none">👁 全部显示</button>
  </div>

  <div id="content-wrap">
    <!-- Search panel -->
    <div id="search-panel">
      <h3 id="sr-count"></h3>
      <div id="sr-list"></div>
    </div>

    <!-- Chapter panel -->
    <div id="chapter-panel">
      <div id="ch-header">
        <h2 id="ch-title">请从左侧选择章节</h2>
        <span id="ch-meta"></span>
        <button id="done-btn">✓ 标记已学</button>
      </div>
      <div id="article"></div>
      <div id="ch-nav">
        <button id="prev-btn">← 上一章</button>
        <span class="nav-info" id="nav-info"></span>
        <button id="next-btn">下一章 →</button>
      </div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
'use strict';
const { chapters, pages } = STUDY_DATA;
let curChIdx = 0;
let memoMode = false;

// ── Storage ──────────────────────────────────────────────────────────
const store = {
  get() { try { return JSON.parse(localStorage.getItem('sp') || '{}'); } catch { return {}; } },
  set(d) { localStorage.setItem('sp', JSON.stringify(d)); },
};

// ── Progress ─────────────────────────────────────────────────────────
function getDone() { return store.get().done || {}; }
function isDone(i) { return !!getDone()[i]; }
function toggleDone(i) {
  const s = store.get();
  s.done = s.done || {};
  isDone(i) ? delete s.done[i] : (s.done[i] = 1);
  store.set(s);
  renderSidebar();
  renderProgress();
  renderDoneBtn();
}
function renderProgress() {
  const n = Object.keys(getDone()).length, t = chapters.length;
  document.getElementById('prog-text').textContent = `${n} / ${t} 章`;
  document.getElementById('prog-fill').style.width = `${t ? n/t*100 : 0}%`;
}

// ── Check-in ─────────────────────────────────────────────────────────
const today = () => new Date().toLocaleDateString('zh-CN');
function getStreak() { return store.get().streak || { days: 0, last: null }; }

function checkIn() {
  const s = store.get();
  const st = s.streak || { days: 0, last: null };
  const t = today();
  const yest = new Date(Date.now() - 864e5).toLocaleDateString('zh-CN');
  if (st.last === t) { alert('今天已经打卡了！继续加油 🎉'); return; }
  st.days = st.last === yest ? st.days + 1 : 1;
  st.last = t;
  s.streak = st;
  store.set(s);
  renderStreak();
  renderCheckinBtn();
  alert(`打卡成功！连续第 ${st.days} 天 🔥`);
}

function renderStreak() {
  const st = getStreak();
  const el = document.getElementById('streak');
  el.textContent = st.days > 0 ? `🔥 ${st.days} 天` : '';
}
function renderCheckinBtn() {
  const btn = document.getElementById('checkin-btn');
  const st = getStreak();
  const done = st.last === today();
  btn.textContent = done ? `✅ 已打卡（连续 ${st.days} 天）` : '📅 今日打卡';
  btn.className = done ? 'done' : '';
}

// ── Sidebar ───────────────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('ch-list');
  list.innerHTML = '';
  chapters.forEach((ch, i) => {
    const div = document.createElement('div');
    div.className = 'ch-item' + (i === curChIdx ? ' active' : '') + (isDone(i) ? ' done' : '');
    div.innerHTML = `<div class="ch-dot"></div><div class="ch-label">${ch.title}</div>`;
    div.onclick = () => showChapter(i);
    list.appendChild(div);
  });
}

// ── Chapter View ─────────────────────────────────────────────────────
function chapterPages(idx) {
  const start = chapters[idx].startPage;
  const end = chapters[idx + 1]?.startPage ?? Infinity;
  return pages.filter(p => p.page >= start && p.page < end);
}

function showChapter(idx) {
  curChIdx = idx;
  const ch = chapters[idx];
  const cPages = chapterPages(idx);

  // Sidebar highlight
  document.querySelectorAll('.ch-item').forEach((el, i) => el.classList.toggle('active', i === idx));
  document.getElementById('ch-list').children[idx]?.scrollIntoView({ block: 'nearest' });

  // Header
  document.getElementById('ch-title').textContent = ch.title;
  document.getElementById('ch-meta').textContent = `第 ${ch.startPage} 页起 · ${cPages.length} 页`;
  renderDoneBtn();

  // Build article HTML – continuous flow with subtle page markers
  const article = document.getElementById('article');
  let html = '';
  cPages.forEach(p => {
    html += `<span class="page-marker">第 ${p.page} 页</span>\n${p.html}`;
  });
  article.innerHTML = html;
  article.scrollTop = 0;

  // Memo mode click handlers
  attachMemoHandlers();

  // Nav
  const nav = document.getElementById('ch-nav');
  nav.className = 'visible';
  document.getElementById('nav-info').textContent = `${idx + 1} / ${chapters.length} 章`;
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').disabled = idx === chapters.length - 1;

  hideSearch();
}

function renderDoneBtn() {
  const btn = document.getElementById('done-btn');
  btn.textContent = isDone(curChIdx) ? '✅ 已学完' : '✓ 标记已学';
  btn.className = isDone(curChIdx) ? 'done' : '';
}

// ── Memo Mode ─────────────────────────────────────────────────────────
function attachMemoHandlers() {
  if (!memoMode) return;
  document.querySelectorAll('#article p, #article li').forEach(el => {
    el.classList.remove('show');
    el.onclick = () => el.classList.toggle('show');
  });
}

function toggleMemo() {
  memoMode = !memoMode;
  document.body.classList.toggle('memo', memoMode);
  document.getElementById('memo-btn').classList.toggle('on', memoMode);
  document.getElementById('reveal-btn').style.display = memoMode ? '' : 'none';
  if (!memoMode) {
    document.querySelectorAll('#article p, #article li').forEach(el => el.classList.remove('show'));
  } else {
    attachMemoHandlers();
  }
}

function revealAll() {
  document.querySelectorAll('#article p, #article li').forEach(el => el.classList.add('show'));
}

// ── Search ────────────────────────────────────────────────────────────
let fuse = null;
function initFuse() {
  fuse = new Fuse(pages, {
    keys: ['text'], threshold: 0.3, includeMatches: true,
    minMatchCharLength: 2, distance: 20000, ignoreLocation: true,
  });
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function doSearch(q) {
  if (!q.trim()) { hideSearch(); return; }
  if (!fuse) initFuse();
  const res = fuse.search(q, { limit: 30 });
  document.getElementById('search-panel').style.display = 'block';
  document.getElementById('chapter-panel').style.display = 'none';
  document.getElementById('sr-count').textContent = `找到 ${res.length} 条结果（"${q}"）`;
  const list = document.getElementById('sr-list');
  list.innerHTML = '';
  res.forEach(r => {
    const p = r.item;
    const ch = chapters[p.chapterIdx]?.title ?? '';
    let snip = p.text.substring(0, 200);
    if (r.matches?.[0]) {
      const [s] = r.matches[0].indices[0];
      const from = Math.max(0, s - 60);
      snip = (from > 0 ? '…' : '') + p.text.substring(from, from + 240);
    }
    snip = esc(snip).replace(new RegExp(esc(q), 'gi'), m => `<mark>${m}</mark>`);
    const div = document.createElement('div');
    div.className = 'sr-item';
    div.innerHTML = `<div class="sr-tag">第 ${p.page} 页 · ${ch}</div><div class="sr-snippet">${snip}</div>`;
    div.onclick = () => {
      showChapter(p.chapterIdx);
      document.getElementById('search-input').value = '';
      // Scroll to page marker
      setTimeout(() => {
        const markers = document.querySelectorAll('.page-marker');
        for (const m of markers) {
          if (m.textContent.includes(`第 ${p.page} 页`)) {
            m.scrollIntoView({ behavior: 'smooth', block: 'start' });
            break;
          }
        }
      }, 150);
    };
    list.appendChild(div);
  });
}

function hideSearch() {
  document.getElementById('search-panel').style.display = 'none';
  document.getElementById('chapter-panel').style.display = 'flex';
}

// ── Wire events ───────────────────────────────────────────────────────
document.getElementById('checkin-btn').onclick = checkIn;
document.getElementById('memo-btn').onclick = toggleMemo;
document.getElementById('reveal-btn').onclick = revealAll;
document.getElementById('done-btn').onclick = () => toggleDone(curChIdx);
document.getElementById('prev-btn').onclick = () => showChapter(curChIdx - 1);
document.getElementById('next-btn').onclick = () => showChapter(curChIdx + 1);

let sTimer;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(sTimer);
  sTimer = setTimeout(() => doSearch(e.target.value), 280);
});
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Escape') { e.target.value = ''; hideSearch(); }
});

// ── Boot ──────────────────────────────────────────────────────────────
renderSidebar();
renderProgress();
renderStreak();
renderCheckinBtn();
showChapter(0);
</script>
</body>
</html>
